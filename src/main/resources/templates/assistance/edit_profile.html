<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Profil - MediAssist</title>
    <link rel="stylesheet" th:href="@{/css/assistance/home.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <div class="logo">
            <i class="fas fa-heartbeat"></i>
            <span>MediCare</span>
        </div>
        <a href="/assistance/home"><i class="fas fa-home"></i> Accueil</a>
        <a href="/assistance/appointments"><i class="fas fa-calendar-alt"></i> RDV</a>
        <a href="/assistance/profile" class="active"><i class="fas fa-user-circle"></i> Profil</a>
    </div>
    <div class="nav-right">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </button>
        </form>
    </div>
</nav>

<div class="center-content">
    <div class="dashboard-card edit-profile-card">
        <h2 class="profile-title">
            <i class="fas fa-user-edit"></i> Modifier mon Profil
        </h2>
        
        <form th:action="@{/assistance/profile/update}" method="post" class="profile-form">
            <div class="form-group">
                <label>Prénom :</label>
                <input type="text" th:field="${assistance.firstName}" class="form-input">
            </div>
            
            <div class="form-group">
                <label>Nom :</label>
                <input type="text" th:field="${assistance.lastName}" class="form-input">
            </div>
            
            <div class="form-group">
                <label>Adresse :</label>
                <textarea th:field="${assistance.adresse}" class="form-textarea"></textarea>
            </div>
            
            <div class="form-group">
                <label>Ville :</label>
                <input type="text" th:field="${assistance.ville}" class="form-input">
            </div>

            <div class="quick-actions">
                <button type="submit" class="action-btn success">
                    <i class="fas fa-save"></i> Enregistrer
                </button>
                <a href="/assistance/profile" class="action-btn secondary">
                    <i class="fas fa-times"></i> Annuler
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
