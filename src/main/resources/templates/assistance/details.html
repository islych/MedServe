
<!-- details.html - For viewing a single assistance -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assistance Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Assistance Details</h2>
        <div class="card">
            <div class="card-header">
                <span th:text="${assistance.firstName + ' ' + assistance.lastName}"></span>
            </div>
            <div class="card-body">
                <p><strong>ID:</strong> <span th:text="${assistance.id}"></span></p>
                <p><strong>First Name:</strong> <span th:text="${assistance.firstName}"></span></p>
                <p><strong>Last Name:</strong> <span th:text="${assistance.lastName}"></span></p>
                <p><strong>username:</strong> <span th:text="${assistance.email}"></span></p>
                <!-- Add more fields as needed -->
            </div>
            <div class="card-footer">
                <a th:href="@{/assistance/all}" class="btn btn-primary">Back to List</a>
                <a th:href="@{/assistance/modify/{id}(id=${assistance.id})}" class="btn btn-warning">Edit</a>
                <a th:href="@{/assistance/delete/{id}(id=${assistance.id})}" class="btn btn-danger" 
                   onclick="return confirm('Are you sure you want to delete this assistance?')">Delete</a>
            </div>
        </div>
    </div>
</body>
</html>
