<!-- modify.html - For editing an assistance -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Assistance</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        
        <h2>Edit Assistance</h2>
        <form th:action="@{/assistance/modify/{id}(id=${id})}" th:object="${assistance}" method="post">
            <input type="hidden" th:field="*{id}">
            <div class="mb-3">
                <label for="firstname" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstname" th:field="*{firstName}" required>
            </div>
            <div class="mb-3">
                <label for="lastname" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastname" th:field="*{lastName}" required>
            </div>
            <div class="mb-3">
                <label for="username" class="form-label">username</label>
                <input type="email" class="form-control" id="username" th:field="*{email}" required>
            </div>
            
            <p th:if="${rendezvous.patient != null}">
                <strong>Nom:</strong> [[${rendezvous.patient.nom}]]
            </p>
            <p th:if="${rendezvous.patient == null}" class="text-danger">
                Information patient non disponible
            </p>
            
            <div class="mb-3">
                <button type="submit" class="btn btn-primary">Update</button>
                <a th:href="@{/assistance/all}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
