<div th:if="${rendezvous}">
    <!-- Ajoutez la vérification null -->
    <h2>Patient</h2>
    <p th:if="${rendezvous.patient != null}">
        <strong>Nom:</strong> [[${rendezvous.patient.nom}]]
        <strong>Email:</strong> [[${rendezvous.patient.email}]]
    </p>
    <p th:if="${rendezvous.patient == null}" class="text-danger">
        Information patient non disponible
    </p>

    <!-- Ajoutez le CSRF token -->
    <form th:action="@{/rendezvous/{id}/confirm(id=${rendezvous.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-success">
            <i class="bi bi-check-circle"></i> Confirmer
        </button>
    </form>

    <form th:action="@{/rendezvous/{id}/reject(id=${rendezvous.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="text" name="reason" class="form-control" placeholder="Raison du rejet" required>
        <button type="submit" class="btn btn-danger mt-2">
            <i class="bi bi-x-circle"></i> Rejeter
        </button>
    </form>
</div>
