<!-- register_patient.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Registration</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Patient Registration</h3>
                </div>
                <div class="card-body">
                    <form th:action="@{/auth/register/patient}" th:object="${patientRequest}" method="post">
                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName" th:field="*{firstName}" required>
                        </div>
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" th:field="*{lastName}" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required>
                        </div>
                        <div class="mb-3">
                            <label for="ville" class="form-label">City</label>
                            <select class="form-control" id="ville" th:field="*{ville}" required>
                                <option value="" disabled selected>Sélectionnez votre ville</option>
                                <option th:each="ville : ${villes}" 
                                        th:value="${ville}" 
                                        th:text="${ville}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="adresse" class="form-label">Address</label>
                            <textarea class="form-control" id="adresse" th:field="*{adresse}" rows="3" required></textarea>
                        </div>
                        <!-- <div class="mb-3">
                            <label for="age" class="form-label">Age</label>
                            <input type="number" class="form-control" id="age" th:field="*{age}" required>
                        </div> -->
                        <!-- <div class="mb-3">
                            <label for="date_naissance" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_naissance" th:field="*{date_naissance}" required>
                        </div> -->
<div class="mb-3">
    <label for="date_naissance" class="form-label">Date de naissance</label>
    <input type="date" 
           class="form-control" 
           id="date_naissance" 
           th:field="*{date_naissance}" 
           required
           max="2006-05-18" 
           oninput="checkAge(this)">
    <small class="text-danger" id="ageError"></small>
</div>


                        
                        <div class="mb-3">
                            <label for="medicaList" class="form-label">Medical Conditions (separated by commas)</label>
                            <input type="text" class="form-control" id="medicaList" th:field="*{medicaList}">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Register</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <p>Already have an account? <a th:href="@{/auth/login}">Login here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function checkAge(input) {
    const errorElement = document.getElementById('ageError');
    const selectedDate = new Date(input.value);
    const minDate = new Date();
    minDate.setFullYear(minDate.getFullYear() - 18);
    
    if(selectedDate > minDate) {
        errorElement.textContent = "Vous devez avoir au moins 18 ans";
        input.value = '';
    } else {
        errorElement.textContent = '';
    }
}
</script>
</body>
</html>
