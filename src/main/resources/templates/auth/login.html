<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="text-center mb-0">Connexion</h3>
                    </div>
                    
                    <div class="card-body">
                         <div class="text-center mb-4">
                            <a th:href="@{/}" class="text-decoration-none">
                                <i class="fas fa-home me-2"></i>Retour à l'accueil
                            </a>
                        </div>
                        <!-- Message d'erreur -->
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <span th:text="${error}"></span>
                        </div>

                        <form th:action="@{/auth/login}" th:object="${authRequest}" method="post">
                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Adresse Email</label>
                                <input type="email" 
                                       class="form-control" 
                                       id="email"
                                       th:field="*{email}"
                                       required
                                       placeholder="exemple@domain.com">
                            </div>
                            
                            <!-- Mot de passe -->
                            <div class="mb-4">
                                <label for="password" class="form-label">Mot de passe</label>
                                <input type="password" 
                                       class="form-control" 
                                       id="password"
                                       th:field="*{password}"
                                       required
                                       placeholder="••••••••">
                            </div>
                            
                            <!-- Bouton de soumission -->
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Se connecter
                                </button>
                            </div>
                        </form>

                        <!-- Liens d'inscription -->
                        <div class="mt-4 text-center">
                            <p class="text-muted">Pas encore de compte ?</p>
                            <div class="d-flex flex-column gap-2">
                                <a th:href="@{/auth/register/patient}" class="btn btn-outline-dark">
                                    S'inscrire comme Patient
                                </a>
                                <a th:href="@{/auth/register/doctor}" class="btn btn-outline-dark">
                                    S'inscrire comme Médecin
                                </a>
                                <!-- <a th:href="@{/auth/register/assistance}" class="btn btn-outline-dark">
                                    S'inscrire comme Assistant
                                </a> -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
