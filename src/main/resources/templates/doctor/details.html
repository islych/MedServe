<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prendre Rendez-vous - Medical App</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: url('/images/doctors-background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.6); /* assombrit le fond */
            min-height: 100vh;
            padding: 50px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background-color: #002366; /* bleu roi */
            border-color: #002366;
        }
        .btn-primary:hover {
            background-color: #001a4d;
            border-color: #001a4d;
        }
    </style>
</head>
<body>
    <div class="overlay d-flex justify-content-center align-items-center">
        <div class="card col-lg-6">
            <h2 class="text-center text-primary mb-4">Prendre Rendez-vous</h2>

            <div class="text-center mb-4">
                <h3 th:text="${'Dr. ' + doctor.firstName + ' ' + doctor.lastName}"></h3>
                <p class="text-muted" th:text="${doctor.specialty?.displayName}"></p>
            </div>

            <!-- Formulaire pour rediriger vers la page de prise de rendez-vous -->
            <form th:action="@{/rendezvous/new}" method="get">
                <input type="hidden" name="doctorId" th:value="${doctor.id}">

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Prendre Rendez-vous</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/patients/home}" class="btn btn-outline-primary">Retour à l'accueil</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
