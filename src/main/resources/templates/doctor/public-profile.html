<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Profil Public du Médecin</title>
    <link rel="stylesheet" th:href="@{/css\patient\publicProfile.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <i class="fas fa-heartbeat"></i>
                <span>MediCare</span>
            </div>
            <a href="/patients/home" class="ripple"><i class="fas fa-home"></i> Accueil</a>
            <a href="/patients/doctors" class="ripple"><i class="fas fa-user-md"></i> Médecins</a>
            <a href="/patients/appointments" class="ripple"><i class="far fa-calendar-check"></i> Rendez-vous</a>
        </div>
    </nav>

    <div class="profile-container">
        <div class="doctor-profile-header">
            <div class="profile-avatar">
                <img th:src="${doctor.photoUrl ?: '/images/default-avatar.png'}" 
                     alt="Photo du médecin"
                     class="profile-main-photo">
            </div>
            <div class="profile-info">
                <h1>Dr. <span th:text="${doctor.firstName + ' ' + doctor.lastName}"></span></h1>
                <h2 th:text="${doctor.specialty?.name ?: 'Spécialité non spécifiée'}"></h2>
                <div class="location">
                    <i class="fas fa-map-marker-alt"></i>
                    <span th:text="${doctor.ville + ', ' + doctor.adresse}"></span>
                </div>
            </div>
        </div>

        <div class="profile-content">
            <div class="details-grid">
                <div class="detail-card">
                    <i class="fas fa-birthday-cake"></i>
                    <h4>Âge</h4>
                    <p th:text="${doctor.age + ' ans'}"></p>
                </div>
                
              
                
            </div>

            <div class="action-buttons">
                <a th:href="@{/rendezvous/new?doctorId={id}(id=${doctor.id})}" 
                   class="btn btn-primary">
                   <i class="fas fa-calendar-plus"></i> Prendre rendez-vous
                </a>
            </div>
        </div>
    </div>

    <footer class="medical-footer">
        <!-- Footer content -->
    </footer>
</body>
</html>
