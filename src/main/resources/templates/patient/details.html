<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h2>Patient Details</h2>
        <div class="card">
            <div class="card-header">
                <h3 th:text="${patient.firstName + ' ' + patient.lastName}"></h3>
            </div>
            <div class="card-body">
                <p><strong>ID:</strong> <span th:text="${patient.id}"></span></p>
                <p><strong>First Name:</strong> <span th:text="${patient.firstName}"></span></p>
                <p><strong>Last Name:</strong> <span th:text="${patient.lastName}"></span></p>
                <p><strong>username:</strong> <span th:text="${patient.email}"></span></p>
                <p><strong>Date of Birth:</strong> <span th:text="${#dates.format(patient.date_naissance, 'dd-MM-yyyy')}"></span></p>
                <p><strong>Address:</strong> <span th:text="${patient.adresse}"></span></p>
                <!-- Add more patient fields as needed -->
            </div>
            <div class="card-footer">
                <a th:href="@{/patients/all}" class="btn btn-primary">Back to List</a>
                <a th:href="@{/patients/modify/{id}(id=${patient.id})}" class="btn btn-warning">Edit</a>
                <a th:href="@{/patients/delete/{id}(id=${patient.id})}" class="btn btn-danger" 
                   onclick="return confirm('Are you sure you want to delete this patient?')">Delete</a>
            </div>
        </div>
    </div>
</body>
</html>
