<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Confirmation de rendez-vous</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .confirmation-card {
            max-width: 600px;
            margin: 2rem auto;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="bg-light">
<div class="confirmation-card card">
    <div class="card-body" th:if="${confirmation}">
        <div class="alert alert-success mb-4">
            <h4 class="alert-heading">✅ Rendez-vous confirmé !</h4>
            <div class="mt-3">
                <p>
                    Votre rendez-vous avec 
                    <span class="fw-bold text-success">Dr. [[${doctorName}]]</span> 
                    a été enregistré avec succès.
                </p>
                <hr>
                <div class="row mt-3">
                    <div class="col-6">
                        <p class="mb-1 text-muted">Date :</p>
                        <p class="h5" th:text="${#dates.format(rdvDate, 'EEEE dd MMMM yyyy', #locale)}"></p>
                    </div>
                    <div class="col-6">
                        <p class="mb-1 text-muted">Heure :</p>
                        <p class="h5" th:text="${#dates.format(rdvDate, 'HH:mm', #locale)}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-grid gap-3">
            <a th:href="@{/rendezvous}" class="btn btn-lg btn-success">
                Consulter mes rendez-vous
            </a>
            <a th:href="@{/patients/doctors}" class="btn btn-outline-secondary">
                Prendre un nouveau rendez-vous
            </a>
        </div>
    </div>

    <div th:unless="${confirmation}" class="card-body">
        <div class="alert alert-danger">
            <h4 class="alert-heading">⚠️ Erreur de confirmation</h4>
            <p class="mt-3">Aucune confirmation de rendez-vous n'a été trouvée.</p>
        </div>
        <div class="d-grid gap-2">
            <a th:href="@{/}" class="btn btn-primary">
                Retour à l'accueil
            </a>
            <a th:href="@{/contact}" class="btn btn-outline-danger">
                Contacter le support
            </a>
        </div>
    </div>
</div>
</body>
</html>
